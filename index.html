<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatinhos Aleatórios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Seu Gatinho do Dia! </h1>
        
        <div class="image-wrapper">
            <p id="loading-message">Procurando um gatinho fofo...</p>
            
            <img id="cat-image" src="" alt="Imagem aleatória de um gatinho">
            
            <p id="error-message">Oops! Não conseguimos encontrar um gatinho agora. Tente novamente mais tarde.</p>
        </div>

        <button onclick="buscarGatinho()">Quero ver outro!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
